[env]
platform = teensy
board = teensy40
framework = arduino
upload_protocol = teensy-cli
board_microros_distro = humble
board_microros_transport = serial

lib_deps =
    https://github.com/micro-ROS/micro_ros_arduino.git
    waspinator/AccelStepper @ ^1.64

lib_ignore = 
    NativeEthernet
    Ethernet
    FNET
    
build_flags = 
    -D MICRO_ROS_BUFFER_SIZE=2048
    -L .pio/libdeps/$PIOENV/micro_ros_arduino/src/imxrt1062/fpv5-d16-hard/
    -lmicroros

[env:ze_manual]
build_src_filter = -<main_manual.cpp> +<main_fsm.cpp>
build_flags = 
    ${env.build_flags}
    -D NODE_NAME=\"ze_node\"
    -D TOPIC_NAME=\"ze_manual_cmd\"

[env:ze_fsm]
build_src_filter = -<main_manual.cpp> +<main_fsm.cpp>
build_flags = 
    ${env.build_flags}
    -D NODE_NAME=\"ze_node\"
    -D SUB_TOPIC=\"z_command\"
    -D PUB_TOPIC=\"ze_status\"
    -D ZE_TARGET_INDEX=5  ;CMD_Z_RIGHT_TARGET from risc_bus.h
    -D HW_ID=4.0         ;Unique ID for zE reporting